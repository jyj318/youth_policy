<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청년정책 — 복잡한 청년 정책, 쉽게 찾아드려요</title>
<meta name="description" content="청년을 위한 정책과 복지 정보를 한눈에. 지역, 나이, 필요에 맞는 맞춤 정책을 찾아보세요.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-info: #e8f0fe;
  --text-primary: #1a1a1a;
  --text-secondary: #5f6368;
  --text-tertiary: #9aa0a6;
  --border-primary: #dadce0;
  --border-secondary: #e8eaed;
  --border-tertiary: #f1f3f4;
  --accent: #185FA5;
  --accent-light: #E6F1FB;
  --radius-md: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1e;
    --bg-secondary: #2a2a2a;
    --bg-info: #1a2a3a;
    --text-primary: #e3e3e3;
    --text-secondary: #a0a0a0;
    --text-tertiary: #6b6b6b;
    --border-primary: #444;
    --border-secondary: #383838;
    --border-tertiary: #333;
    --accent-light: #1a2a3a;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-secondary); color: var(--text-primary); }
.app { display: flex; flex-direction: column; height: 100vh; background: var(--bg-primary); }

/* ===== TOPBAR ===== */
.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 20px; border-bottom: 1px solid var(--border-tertiary); background: var(--bg-primary); position: relative; z-index: 10; flex-shrink: 0; }
.logo { font-size: 17px; font-weight: 600; color: var(--text-primary); white-space: nowrap; cursor: pointer; user-select: none; transition: opacity .15s; }
.logo span { color: var(--accent); }
.logo:hover { opacity: .7; }

.search-outer { flex: 1; max-width: 560px; position: relative; }
.search-box { display: flex; align-items: center; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-secondary); transition: border-color .15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-inp { flex: 1; padding: 0 14px; height: 38px; border: none; background: transparent; font-size: 14px; color: var(--text-primary); outline: none; font-family: inherit; }
.search-inp::placeholder { color: var(--text-tertiary); }
.search-btn { padding: 0 14px; height: 38px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; transition: opacity .15s; }
.search-btn:hover { opacity: .85; }
.search-btn i { font-size: 16px; color: #fff; }

.search-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--bg-primary); border: 1px solid var(--border-secondary); border-radius: var(--radius-md); z-index: 100; display: none; max-height: 360px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
.search-dropdown.open { display: block; }
.sd-section { padding: 8px 0; }
.sd-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); padding: 4px 14px 4px; letter-spacing: .04em; }
.sd-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; font-size: 14px; color: var(--text-primary); transition: background .1s; }
.sd-item:hover { background: var(--bg-secondary); }
.sd-item i { font-size: 16px; color: var(--text-tertiary); flex-shrink: 0; }
.sd-badge { font-size: 11px; padding: 2px 7px; border-radius: var(--radius-md); font-weight: 500; margin-left: auto; flex-shrink: 0; }
.b-주거 { background: #E1F5EE; color: #085041; }
.b-금융 { background: #FAEEDA; color: #633806; }
.b-일자리 { background: #E6F1FB; color: #0C447C; }
.b-교육 { background: #EEEDFE; color: #3C3489; }
.b-복지 { background: #FAECE7; color: #712B13; }
.sd-no { font-size: 14px; color: var(--text-tertiary); padding: 16px 14px; }
.sd-hint { font-size: 12px; color: var(--text-tertiary); padding: 4px 14px 8px; cursor: pointer; }
.sd-hint:hover { color: var(--accent); }

/* ===== BODY ===== */
.body { display: flex; flex: 1; min-height: 0; }

/* ===== SIDEBAR ===== */
.sidebar { width: 220px; min-width: 220px; border-right: 1px solid var(--border-tertiary); background: var(--bg-primary); transition: width .2s ease, min-width .2s ease; overflow: hidden; display: flex; flex-direction: column; }
.sidebar.collapsed { width: 48px; min-width: 48px; }
.hamburger { display: flex; align-items: center; gap: 10px; padding: 13px 14px 10px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border-tertiary); }
.hamburger i { font-size: 20px; color: var(--text-secondary); flex-shrink: 0; }
.h-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
.sidebar.collapsed .h-label { display: none; }
.menu-block { overflow-y: auto; flex: 1; }
.m-group { border-bottom: 1px solid var(--border-tertiary); }
.m-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; transition: background .1s; }
.m-head:hover { background: var(--bg-secondary); }
.m-head.active { background: var(--bg-info); }
.m-head.active .mh-label { color: var(--accent); font-weight: 600; }
.m-head.active .mh-icon { color: var(--accent); }
.mh-icon { font-size: 18px; color: var(--text-secondary); flex-shrink: 0; }
.mh-label { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }
.sidebar.collapsed .mh-label { display: none; }
.sidebar.collapsed .m-head { justify-content: center; padding: 10px 0; }

/* ===== MAIN ===== */
.main { flex: 1; overflow-y: auto; min-width: 0; display: flex; flex-direction: column; }
.view { display: none; flex: 1; padding: 28px 32px; overflow-y: auto; }
.view.active { display: flex; flex-direction: column; }
.main-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; flex-shrink: 0; }
.main-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; flex-shrink: 0; }

/* ===== STEPS ===== */
.step-bar { display: flex; align-items: center; margin-bottom: 28px; gap: 4px; flex-shrink: 0; }
.s-item { display: flex; align-items: center; gap: 6px; }
.s-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border-secondary); color: var(--text-tertiary); background: var(--bg-primary); flex-shrink: 0; transition: all .2s; }
.s-num.done { background: var(--accent); color: #fff; border-color: var(--accent); }
.s-num.cur { border-color: var(--accent); color: var(--accent); }
.s-lbl { font-size: 13px; color: var(--text-tertiary); }
.s-lbl.cur { color: var(--accent); font-weight: 500; }
.s-line { flex: 1; height: 1px; background: var(--border-tertiary); margin: 0 6px; }
.panel { display: none; }
.panel.active { display: block; }
.step-q { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 16px; }

.opt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.opt { border: 1.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 14px 8px; cursor: pointer; text-align: center; background: var(--bg-primary); transition: all .15s; }
.opt:hover { border-color: var(--accent); }
.opt.on { border-color: var(--accent); background: var(--accent-light); }
.opt.on .ol { color: #0C447C; }
.opt.on i { color: var(--accent); }
.opt i { font-size: 22px; color: var(--text-tertiary); display: block; margin-bottom: 6px; }
.ol { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.os { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

.age-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.age-btn { border: 1.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 12px; text-align: center; font-size: 14px; font-weight: 500; color: var(--text-primary); cursor: pointer; background: var(--bg-primary); transition: all .15s; }
.age-btn:hover { border-color: var(--accent); }
.age-btn.on { border-color: var(--accent); background: var(--accent-light); color: #0C447C; }

.genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.genre-btn { border: 1.5px solid var(--border-secondary); border-radius: var(--radius-md); padding: 12px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); background: var(--bg-primary); transition: all .15s; }
.genre-btn:hover { border-color: var(--accent); }
.genre-btn.on { border-color: var(--accent); background: var(--accent-light); color: #0C447C; }
.genre-btn i { font-size: 22px; }

.nav-row { display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
.btn-back { font-size: 14px; padding: 9px 18px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: background .1s; }
.btn-back:hover { background: var(--bg-secondary); }
.btn-next { font-size: 14px; padding: 9px 22px; border-radius: var(--radius-md); background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 500; font-family: inherit; transition: opacity .15s; }
.btn-next:hover { opacity: .88; }
.btn-next:disabled { opacity: .3; cursor: not-allowed; }

/* ===== RESULT GRID ===== */
.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
.rcard { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-md); padding: 14px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
.rcard:hover { border-color: var(--border-primary); box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.rcard-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dot-g { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
.rt { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
.rd { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.reset-btn { font-size: 13px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit; }

/* ===== CATEGORY VIEW ===== */
.cat-view-header { margin-bottom: 20px; flex-shrink: 0; }
.cat-view-title { font-size: 18px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.cat-view-title i { font-size: 22px; }
.cat-view-sub { font-size: 13px; color: var(--text-secondary); }
.policy-list { display: flex; flex-direction: column; gap: 12px; flex: 1; }
.pcard { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 16px 20px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
.pcard:hover { border-color: var(--border-primary); box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.pcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: var(--radius-md); font-weight: 500; }
.t-모집중 { background: #EAF3DE; color: #27500A; }
.t-상시 { background: #F1EFE8; color: #444441; }
.pcard-title { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
.pcard-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.pcard-meta { display: flex; gap: 12px; margin-top: 10px; }
.meta-item { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
.meta-item i { font-size: 14px; }

/* ===== DETAIL VIEW ===== */
.detail-container { overflow-y: auto; flex: 1; }
.detail-header { margin-bottom: 14px; flex-shrink: 0; }
.detail-back { font-size: 13px; color: var(--accent); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.detail-back:hover { opacity: .7; }
.detail-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.detail-tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.detail-banner { width: 100%; border-radius: var(--radius-lg); margin: 0 0 20px; overflow: hidden; }
.detail-banner svg { width: 100%; display: block; }
.detail-section { margin-bottom: 18px; }
.detail-sec-title { font-size: 13px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 6px; letter-spacing: .03em; }
.detail-sec-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
.detail-link { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; background: var(--accent); color: #fff; border-radius: var(--radius-md); text-decoration: none; font-size: 13px; font-weight: 500; margin-top: 10px; transition: opacity .15s; }
.detail-link:hover { opacity: .85; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar { width: 48px; min-width: 48px; }
  .sidebar .mh-label, .sidebar .h-label { display: none; }
  .sidebar .m-head { justify-content: center; padding: 10px 0; }
  .view { padding: 20px 16px; }
  .opt-grid { grid-template-columns: repeat(2, 1fr); }
  .genre-grid { grid-template-columns: repeat(2, 1fr); }
  .result-grid { grid-template-columns: 1fr; }
  .topbar { padding: 10px 12px; gap: 10px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo" id="logo-btn">청년<span>정책</span></div>
    <div class="search-outer">
      <div class="search-box">
        <input class="search-inp" id="search-inp" type="text" placeholder="정책 이름이나 키워드를 입력하세요..." autocomplete="off">
        <button class="search-btn" onclick="executeSearch()"><i class="ti ti-search"></i></button>
      </div>
      <div class="search-dropdown" id="search-drop"><div id="drop-body"></div></div>
    </div>
  </div>

  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="hamburger" onclick="handleHamburger()">
        <i class="ti ti-menu-2"></i>
        <span class="h-label">메뉴</span>
      </div>
      <div class="menu-block" id="menu-block"></div>
    </div>

    <div class="main">
      <!-- HOME VIEW -->
      <div class="view active" id="view-home">
        <div class="main-title">나를 위한 정책 찾기</div>
        <div class="main-sub">몇 가지만 답하면 딱 맞는 정책을 골라드려요</div>
        <div class="step-bar">
          <div class="s-item"><div class="s-num cur" id="sn1">1</div><div class="s-lbl cur" id="sl1">지역</div></div><div class="s-line"></div>
          <div class="s-item"><div class="s-num" id="sn2">2</div><div class="s-lbl" id="sl2">나이</div></div><div class="s-line"></div>
          <div class="s-item"><div class="s-num" id="sn3">3</div><div class="s-lbl" id="sl3">필요한 지원</div></div><div class="s-line"></div>
          <div class="s-item"><div class="s-num" id="sn4">✓</div><div class="s-lbl" id="sl4">결과</div></div>
        </div>
        <div class="panel active" id="p1">
          <div class="step-q">어느 지역에 살고 있나요?</div>
          <div class="opt-grid">
            <div class="opt" onclick="pick(this,'서울')"><i class="ti ti-building-skyscraper"></i><div class="ol">서울</div><div class="os">서울시+중앙</div></div>
            <div class="opt" onclick="pick(this,'경기')"><i class="ti ti-trees"></i><div class="ol">경기·인천</div><div class="os">경기+중앙</div></div>
            <div class="opt" onclick="pick(this,'기타광역시')"><i class="ti ti-building"></i><div class="ol">기타 광역시</div><div class="os">부산·대구 등</div></div>
            <div class="opt" onclick="pick(this,'전국')"><i class="ti ti-map"></i><div class="ol">전국</div><div class="os">중앙정부만</div></div>
          </div>
          <div class="nav-row"><button class="btn-next" id="n1" onclick="goStep(2)" disabled>다음 →</button></div>
        </div>
        <div class="panel" id="p2">
          <div class="step-q">나이를 선택해주세요</div>
          <div class="age-row">
            <div class="age-btn" onclick="pickAge(this,'19~24')">19~24세</div>
            <div class="age-btn" onclick="pickAge(this,'25~29')">25~29세</div>
            <div class="age-btn" onclick="pickAge(this,'30~34')">30~34세</div>
            <div class="age-btn" onclick="pickAge(this,'35~39')">35~39세</div>
          </div>
          <div class="nav-row"><button class="btn-back" onclick="goStep(1)">← 이전</button><button class="btn-next" id="n2" onclick="goStep(3)" disabled>다음 →</button></div>
        </div>
        <div class="panel" id="p3">
          <div class="step-q">어떤 지원이 필요한가요? <span style="font-size:12px;color:var(--text-tertiary);font-weight:400;">(복수 선택)</span></div>
          <div class="genre-grid">
            <div class="genre-btn" onclick="tog(this,'주거·월세')"><i class="ti ti-home" style="color:#0F6E56"></i>주거·월세</div>
            <div class="genre-btn" onclick="tog(this,'취업·일자리')"><i class="ti ti-briefcase" style="color:#185FA5"></i>취업·일자리</div>
            <div class="genre-btn" onclick="tog(this,'금융·학자금')"><i class="ti ti-coin" style="color:#854F0B"></i>금융·학자금</div>
            <div class="genre-btn" onclick="tog(this,'교육·문화')"><i class="ti ti-book" style="color:#534AB7"></i>교육·문화</div>
            <div class="genre-btn" onclick="tog(this,'마음건강')"><i class="ti ti-heart" style="color:#993556"></i>마음건강</div>
            <div class="genre-btn" onclick="tog(this,'창업')"><i class="ti ti-rocket" style="color:#993C1D"></i>창업</div>
          </div>
          <div class="nav-row"><button class="btn-back" onclick="goStep(2)">← 이전</button><button class="btn-next" id="n3" onclick="showResult()" disabled>결과 보기 →</button></div>
        </div>
        <div class="panel" id="p4">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div class="step-q" style="margin:0" id="rlabel">추천 정책</div>
            <button class="reset-btn" onclick="resetSteps()"><i class="ti ti-refresh"></i> 다시 찾기</button>
          </div>
          <div class="result-grid" id="rgrid"></div>
        </div>
      </div>

      <!-- CATEGORY VIEW -->
      <div class="view" id="view-cat">
        <div class="cat-view-header"><div class="cat-view-title"><i id="cat-icon"></i><span id="cat-title"></span></div><div class="cat-view-sub" id="cat-sub"></div></div>
        <div class="policy-list" id="cat-policy-list"></div>
      </div>

      <!-- SEARCH VIEW -->
      <div class="view" id="view-search">
        <div style="margin-bottom:18px;flex-shrink:0;"><div style="font-size:16px;font-weight:600;color:var(--text-primary);" id="search-result-label">검색 결과</div></div>
        <div class="policy-list" id="search-policy-list"></div>
      </div>

      <!-- DETAIL VIEW -->
      <div class="view" id="view-detail">
        <div class="detail-container">
          <div class="detail-header"><button class="detail-back" onclick="goBack()"><i class="ti ti-arrow-left"></i>돌아가기</button></div>
          <div class="detail-title" id="dt-title"></div>
          <div class="detail-tags" id="dt-tags"></div>
          <div class="detail-banner" id="dt-banner"></div>
          <div class="detail-section"><div class="detail-sec-title">정책 설명</div><div class="detail-sec-content" id="dt-desc"></div></div>
          <div class="detail-section"><div class="detail-sec-title">지원 내용</div><div class="detail-sec-content" id="dt-benefit"></div></div>
          <div class="detail-section"><div class="detail-sec-title">대상</div><div class="detail-sec-content" id="dt-target"></div></div>
          <div class="detail-section"><div class="detail-sec-title">신청 방법</div><div class="detail-sec-content" id="dt-apply"></div><a class="detail-link" id="dt-link" target="_blank" href="#"><i class="ti ti-external-link"></i>공식 웹사이트 방문</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

function openCat(i){
  document.querySelectorAll('.m-head').forEach(h=>h.classList.remove('active'));
  document.getElementById('mh-'+i).classList.add('active');
  const cat=CATS[i];
  document.getElementById('cat-icon').className='ti '+cat.icon;
  document.getElementById('cat-icon').style.color=cat.color;
  document.getElementById('cat-title').textContent=cat.label;
  document.getElementById('cat-sub').textContent=cat.sub;
  document.getElementById('cat-policy-list').innerHTML=DB.filter(cat.filter).map(makePCard).join('');
  prevView='cat';showView('cat');
}

// ===== 정책 카드 =====
function makePCard(p){
  return `<div class="pcard" onclick="showDetail('${p.t.replace(/'/g,"\\'")}')"><div class="pcard-top"><span class="tag b-${p.c}">${p.c}</span><span class="tag t-${p.s}">${p.s}</span></div><div class="pcard-title">${p.t}</div><div class="pcard-desc">${p.d}</div><div class="pcard-meta"><span class="meta-item"><i class="ti ti-user"></i>${p.tg}</span></div></div>`;
}

// ===== 뷰 전환 =====
function showView(v){document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');if(v==='home')document.querySelectorAll('.m-head').forEach(h=>h.classList.remove('active'));}
function goHome(){prevView='home';showView('home');}

// ===== 상세 페이지 =====
function showDetail(title){
  const p=DB.find(x=>x.t===title);if(!p)return;
  document.getElementById('dt-title').textContent=p.t;
  document.getElementById('dt-tags').innerHTML=`<span class="tag b-${p.c}">${p.c}</span><span class="tag t-${p.s}">${p.s}</span>`;
  document.getElementById('dt-banner').innerHTML=makeBanner(p);
  document.getElementById('dt-desc').textContent=p.desc;
  document.getElementById('dt-benefit').textContent=p.bn;
  document.getElementById('dt-target').textContent=p.tg;
  document.getElementById('dt-apply').textContent=p.ap;
  document.getElementById('dt-link').href=p.lk;
  prevView=document.querySelector('.view.active')?.id?.replace('view-','')||'home';
  showView('detail');
}
function goBack(){showView(prevView==='detail'?'cat':prevView);}

// ===== 검색 =====
function scoreMatch(p,q){
  const ql=q.toLowerCase();let score=0;
  if(p.t.toLowerCase().includes(ql))score+=10;
  if(p.t.toLowerCase().startsWith(ql))score+=5;
  if(p.d.toLowerCase().includes(ql))score+=3;
  if(p.tg.toLowerCase().includes(ql))score+=3;
  if(p.c.includes(ql))score+=2;
  p.g.forEach(g=>{if(g.toLowerCase().includes(ql))score+=2;});
  return score;
}

document.getElementById('search-inp').addEventListener('input',onSearchInput);
document.getElementById('search-inp').addEventListener('focus',openDrop);
document.getElementById('search-inp').addEventListener('blur',()=>setTimeout(closeDrop,200));
document.getElementById('search-inp').addEventListener('keydown',e=>{if(e.key==='Enter')executeSearch();});

function onSearchInput(){
  const q=document.getElementById('search-inp').value.trim();
  const drop=document.getElementById('drop-body');
  if(!q){
    drop.innerHTML='<div class="sd-section"><div class="sd-label">추천 검색어</div>'+['월세','취업','창업','상담','저축','교육'].map(w=>`<div class="sd-item" onmousedown="document.getElementById('search-inp').value='${w}';executeSearch()"><i class="ti ti-search"></i>${w}</div>`).join('')+'</div>';
    return;
  }
  const scored=DB.map(p=>({p,score:scoreMatch(p,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
  if(!scored.length){drop.innerHTML='<div class="sd-section"><div class="sd-no">검색 결과가 없어요</div></div>';return;}
  drop.innerHTML='<div class="sd-section"><div class="sd-label">연관 정책</div>'+scored.map(x=>`<div class="sd-item" onmousedown="showDetail('${x.p.t.replace(/'/g,"\\'")}');closeDrop()"><i class="ti ti-file-text"></i>${x.p.t}<span class="sd-badge b-${x.p.c}">${x.p.c}</span></div>`).join('')+'</div><div class="sd-section"><div class="sd-hint" onmousedown="executeSearch()">Enter로 전체 검색 결과 보기</div></div>';
}

function executeSearch(){
  const q=document.getElementById('search-inp').value.trim();if(!q)return;
  const scored=DB.map(p=>({p,score:scoreMatch(p,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  document.getElementById('search-result-label').textContent=`"${q}" 검색 결과 ${scored.length}건`;
  document.getElementById('search-policy-list').innerHTML=scored.length?scored.map(x=>makePCard(x.p)).join(''):'<div style="font-size:14px;color:var(--text-tertiary);padding:24px 0;">검색 결과가 없어요.</div>';
  prevView='search';showView('search');
  document.querySelectorAll('.m-head').forEach(h=>h.classList.remove('active'));
  closeDrop();
}

function openDrop(){document.getElementById('search-drop').classList.add('open');onSearchInput();}
function closeDrop(){document.getElementById('search-drop').classList.remove('open');}

// ===== 단계별 찾기 =====
function goStep(n){[1,2,3,4].forEach(i=>{
  document.getElementById('p'+i).classList.toggle('active',i===n);
  const sn=document.getElementById('sn'+i),sl=document.getElementById('sl'+i);
  sn.classList.toggle('done',i<n);sn.classList.toggle('cur',i===n);sl.classList.toggle('cur',i===n);
  if(i<n)sn.textContent='✓';else if(i<4)sn.textContent=i;else sn.textContent='✓';
});}
function pick(el,val){el.closest('.opt-grid').querySelectorAll('.opt').forEach(o=>o.classList.remove('on'));el.classList.add('on');selR=val;document.getElementById('n1').disabled=false;}
function pickAge(el,val){el.closest('.age-row').querySelectorAll('.age-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');selA=val;document.getElementById('n2').disabled=false;}
function tog(el,val){el.classList.toggle('on');selG=Array.from(document.querySelectorAll('.genre-btn.on')).map(b=>b.textContent.trim());document.getElementById('n3').disabled=selG.length===0;}
function showResult(){
  goStep(4);
  const m=DB.filter(p=>{const rOk=p.r.includes(selR)||p.r.includes('전국')||selR==='전국';return rOk&&p.a.includes(selA)&&selG.some(g=>p.g.includes(g));});
  document.getElementById('rlabel').textContent='추천 정책 '+m.length+'개';
  document.getElementById('rgrid').innerHTML=m.length?m.map(p=>`<div class="rcard" onclick="showDetail('${p.t.replace(/'/g,"\\'")}')"><div class="rcard-top"><span class="tag b-${p.c}">${p.c}</span><div class="dot-g"></div></div><div class="rt">${p.t}</div><div class="rd">${p.d}</div></div>`).join(''):'<div style="font-size:14px;color:var(--text-tertiary);padding:24px 0;">조건에 맞는 정책이 없어요.</div>';
}
function resetSteps(){selR='';selA='';selG=[];document.querySelectorAll('.opt,.age-btn,.genre-btn').forEach(el=>el.classList.remove('on'));['n1','n2','n3'].forEach(id=>document.getElementById(id).disabled=true);goStep(1);}
</script>
